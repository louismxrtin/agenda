<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run of Show - gassProductions</title>
<style>
  :root{
    --black:#000000; --near-black:#030303; --white:#FFFFFF;
    --gold:#FFE293; --charcoal:#212121; --dark-grey:#333333;
    --muted:#A8ABB4; --border:#2a2a2a; --panel:#0c0c0c;
    --done:#5a5d63; --next:#9fd3a0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--black);color:var(--white);font-family:Arial, Helvetica, sans-serif;-webkit-font-smoothing:antialiased}
  body{line-height:1.6;padding-bottom:64px}
  a{color:var(--gold)}

  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#000 70%,rgba(0,0,0,.85));border-bottom:1px solid var(--border);backdrop-filter:blur(6px)}
  .head-inner{max-width:none;margin:0 auto;padding:18px 20px 16px}
  .brandrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .logo{height:26px;width:auto;display:block}
  
  .clock{font-variant-numeric:tabular-nums;font-weight:600;font-size:15px;color:var(--gold);text-align:right;line-height:1.2}
  .clock small{display:block;color:var(--muted);font-weight:400;font-size:11px;text-transform:uppercase;letter-spacing:1px}
  h1{font-size:clamp(22px,4.6vw,38px);font-weight:700;line-height:1.15;margin-top:14px}
  .event-meta{color:var(--muted);font-size:14px;margin-top:6px;display:flex;flex-wrap:wrap;gap:6px 18px}
  .event-meta b{color:var(--white);font-weight:500}
  .divider{height:3px;width:54px;background:var(--gold);border-radius:2px;margin-top:14px}
  .offsetbar{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-top:14px;font-size:13px;color:var(--muted)}
  .offsetbar label{color:#fff;font-weight:500}
  .offsetbar input{width:62px;background:#111;color:#fff;border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:14px;font-family:inherit;text-align:center}
  .offsetbar input:focus{outline:none;border-color:var(--gold)}
  .offsetbar button{background:#111;color:var(--gold);border:1px solid var(--border);border-radius:8px;min-width:30px;height:30px;font-size:16px;cursor:pointer;line-height:1}
  .offsetbar button:hover{border-color:var(--gold)}
  .offsetbar .reset{color:var(--muted);font-size:12px;padding:0 10px}
  .offset-note{font-weight:500;margin-left:2px}
  .offset-note.late{color:var(--gold)}
  .offset-note.ok{color:var(--next)}
  .offsetbar .sync{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  .offsetbar .sync::before{content:"○ "}
  .offsetbar .sync.on{color:var(--next)}
  .offsetbar .sync.on::before{content:"● "}
  .crewbtn{color:var(--gold);font-size:12px;padding:4px 12px;text-transform:uppercase;letter-spacing:.5px;background:#111;border:1px solid var(--border);border-radius:8px;cursor:pointer}
  .crewbtn:hover{border-color:var(--gold)}
  .crewpanel{margin-top:12px;border:1px solid var(--border);border-radius:12px;background:#0a0a0a;padding:12px;max-width:560px}
  .crewpanel select{width:100%;background:#111;color:#fff;border:1px solid var(--border);border-radius:8px;padding:9px;font-size:14px;font-family:inherit}
  .crewpanel select:focus{outline:none;border-color:var(--gold)}
  .crewcalls{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .crew-phone{color:var(--gold);font-size:14px;font-weight:500;margin-bottom:4px}
  .crewcall{border:1px solid var(--border);border-radius:8px;padding:8px 10px;background:#0c0c0c}
  .cc-when{font-weight:700;font-variant-numeric:tabular-nums}
  .cc-role{color:var(--muted);font-size:13px;margin-top:2px}
  .cc-note{color:var(--gold);font-size:12px;margin-top:4px}
  .crew-empty{color:var(--muted);font-size:13px}

  .updated{max-width:none;margin:10px auto 0;padding:0 20px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--next);display:inline-block;animation:pulse 2s infinite}
  .followtog{margin-left:auto;display:inline-flex;align-items:center;gap:6px;cursor:pointer;text-transform:none;letter-spacing:0;color:var(--muted)}
  .followtog input{accent-color:var(--gold);width:15px;height:15px;cursor:pointer}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  main{max-width:none;margin:18px auto 0;padding:0 20px}
  .section-head{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--gold);margin:26px 0 12px;display:flex;align-items:center;gap:12px}
  .section-head::after{content:"";flex:1;height:1px;background:var(--border)}

  .seg{display:grid;grid-template-columns:84px 1fr;gap:16px;padding:16px;border:1px solid var(--border);border-radius:14px;background:var(--panel);margin-bottom:12px;position:relative;overflow:hidden}
  .seg.live{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 8px 30px rgba(255,226,147,.12)}
  .seg.done{opacity:.5}
  .seg.break{background:#070707;border-style:dashed}
  .time-start{font-weight:700;font-size:20px;font-variant-numeric:tabular-nums;line-height:1.1}
  .time-end{color:var(--muted);font-size:13px;font-variant-numeric:tabular-nums}
  .dur{margin-top:6px;display:inline-block;font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:2px 8px;text-transform:uppercase;letter-spacing:.5px}

  .info{min-width:0}
  .seg-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .seg-title{font-size:18px;font-weight:600;line-height:1.25;flex:1 1 auto;min-width:0}
  .seg-desc{font-size:14px;color:#cdcdcd;margin-top:6px}
  .items{list-style:none;margin-top:10px;display:flex;flex-direction:column;gap:5px}
  .items li{position:relative;padding-left:18px;font-size:14px;color:#cdcdcd;line-height:1.4}
  .items li::before{content:"";position:absolute;left:2px;top:8px;width:5px;height:5px;border-radius:50%;background:var(--gold)}
  .crew-note{margin-top:10px;font-size:13px;color:var(--gold);background:rgba(255,226,147,.08);border:1px solid rgba(255,226,147,.25);border-radius:8px;padding:6px 10px}
  .crew-note b{text-transform:uppercase;font-size:11px;letter-spacing:1px;color:var(--gold)}

  /* single speaker */
  .solo{display:flex;gap:14px;align-items:flex-start}
  .avatar{width:64px;height:64px;border-radius:12px;object-fit:cover;flex:0 0 auto;background:var(--dark-grey);border:1px solid var(--border)}
  .avatar.initials{display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;color:var(--gold)}
  .speaker-name{font-size:18px;font-weight:700;line-height:1.2}
  .speaker-title{color:var(--muted);font-size:14px;margin-top:1px}
  .speaker-org{color:var(--white);font-weight:500}

  /* multi speaker grid */
  .people{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(240px,100%),1fr));gap:10px;margin-top:12px}
  .person{display:flex;gap:10px;align-items:center;border:1px solid var(--border);border-radius:10px;padding:8px;background:#0a0a0a}
  .person .av{width:44px;height:44px;border-radius:9px;object-fit:cover;flex:0 0 auto;background:var(--dark-grey);border:1px solid var(--border)}
  .person .av.initials{display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:var(--gold)}
  .person .pn{font-size:14px;font-weight:600;line-height:1.2}
  .person .pr{font-size:12px;color:var(--muted);line-height:1.25;margin-top:1px}
  .tag-mod{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#000;background:var(--gold);border-radius:4px;padding:1px 5px;margin-left:4px;vertical-align:middle}

  .badge{flex:0 0 auto;align-self:flex-start;white-space:nowrap;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;border-radius:20px}
  .badge.live{background:var(--gold);color:#000;animation:pulse 1.6s infinite}
  .badge.next{background:transparent;color:var(--next);border:1px solid var(--next)}
  .badge.done{background:transparent;color:var(--done);border:1px solid var(--done)}

  footer{max-width:none;margin:30px auto 0;padding:18px 20px;border-top:1px solid var(--border);color:var(--muted);font-size:12px;text-align:center}
  footer b{color:var(--white)}
  .err{max-width:none;margin:30px auto;padding:20px;border:1px solid #5a2a2a;background:#160a0a;border-radius:12px;color:#ffb4b4}
  @media(max-width:520px){
    .seg{grid-template-columns:60px 1fr;gap:10px;padding:14px}
    .time-start{font-size:16px}
    .avatar{width:50px;height:50px}
    .people{grid-template-columns:1fr}
  }
</style>
</head>
<body>
  <header>
    <div class="head-inner">
      <div class="brandrow">
        <img class="logo" src="/agenda/logo.png" alt="gassProductions">
        <div class="clock"><span id="clock">--:--</span><small id="clockdate">Local time</small></div>
      </div>
      <h1 id="event-title">Loading…</h1>
      <div class="event-meta" id="event-meta"></div>
      <div id="crewPanel" class="crewpanel" hidden>
        <select id="crewSelect"><option value="">Select your name…</option></select>
        <div id="crewCalls" class="crewcalls"></div>
      </div>
      <div class="divider"></div>
      <div class="offsetbar">
        <button type="button" id="offMinus" aria-label="Reduce by 1 minute">−</button>
        <input type="number" id="offset" inputmode="numeric" step="1" value="0">
        <button type="button" id="offPlus" aria-label="Add 1 minute">+</button>
        <span>min</span>
        <button type="button" id="offReset" class="reset">Reset</button>
        <span class="offset-note ok" id="offNote">On schedule</span>
        <label class="followtog"><input type="checkbox" id="followLive"> Auto-scroll to live</label>
        <span class="sync" id="syncState">connecting…</span>
      </div>
    </div>
  </header>

  <div class="updated"><span class="dot"></span><span id="updated">Live - auto-refreshing</span></div>

  <main id="timeline"></main>

  <footer>
    Run of Show by <b>gassProductions</b> · Live Event &amp; Creative Video Production<br>
    This page updates automatically - keep it open, no need to refresh.
  </footer>

<script>
const DATA_URL = './data.json';
// Shared realtime offset channel (public broker). Topic is unique to this event.
const NTFY_TOPIC = 'gass-2150-9k4w-r7m2-offset';   // shared channel on ntfy.sh (HTTPS / port 443)
const NTFY = 'https://ntfy.sh/' + NTFY_TOPIC;
const OFFKEY = 'schedOffset:'+NTFY_TOPIC;
let EVENT = null;
let OFFSET = parseInt(localStorage.getItem(OFFKEY)||'0',10)||0;  // minutes behind schedule
let followLive = localStorage.getItem('followLive')!=='0';  // auto-scroll to live, default on
let lastFocusKey = null;

function pad(n){return String(n).padStart(2,'0');}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toDate(dateStr,timeStr){
  if(!dateStr||!timeStr) return null;
  const [y,m,d]=dateStr.split('-').map(Number);
  const [hh,mm]=timeStr.split(':').map(Number);
  return new Date(y,m-1,d,hh,mm,0,0);
}
function fmtTime(date){return date?pad(date.getHours())+':'+pad(date.getMinutes()):'';}
function initials(name){return name?name.trim().split(/\s+/).slice(0,2).map(w=>w[0]?w[0].toUpperCase():'').join(''):'?';}

function avatarHTML(photo,name,big){
  const cls = big?'avatar':'av';
  if(photo){
    return `<img class="${cls}" src="${esc(photo)}" alt="${esc(name)}" onerror="this.outerHTML='<div class=\\'${cls} initials\\'>${initials(name)}</div>'">`;
  }
  return `<div class="${cls} initials">${initials(name)}</div>`;
}

function niceDate(d){
  const dt=toDate(d,'00:00');
  return dt?dt.toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long',year:'numeric'}):d;
}

function render(){
  if(!EVENT) return;
  document.title=(EVENT.event||'Run of Show')+' - gassProductions';
  document.getElementById('event-title').textContent=EVENT.event||'Untitled Event';
  const meta=[];
  if(EVENT.date)    meta.push(`<span>📅 <b>${esc(niceDate(EVENT.date))}</b></span>`);
  if(EVENT.venue)   meta.push(`<span>📍 <b>${esc(EVENT.venue)}</b></span>`);
  if(EVENT.client)  meta.push(`<span>Client: <b>${esc(EVENT.client)}</b></span>`);
  if(CREW && CREW.length) meta.push(`<span>On-site: <button type="button" class="crewbtn" id="crewBtn">Call times ▾</button></span>`);
  else if(EVENT.contact) meta.push(`<span>On-site: <b>${esc(EVENT.contact)}</b></span>`);
  document.getElementById('event-meta').innerHTML=meta.join('');

  const now=new Date();
  const offMs=OFFSET*60000;
  const segs=(EVENT.schedule||[]).map(s=>{
    const base=toDate(EVENT.date,s.start);
    const start=base?new Date(base.getTime()+offMs):null;
    const dur=Number(s.duration)||0;
    const end=start?new Date(start.getTime()+dur*60000):null;
    return {...s,_start:start,_end:end,_dur:dur};
  }).sort((a,b)=>(a._start?.getTime()||0)-(b._start?.getTime()||0));

  // current item = the one most recently started; it stays "live" through any
  // changeover gap until the next item starts, so there's always a Live now
  let startedIdx=-1;
  for(let i=0;i<segs.length;i++){ if(segs[i]._start && segs[i]._start<=now) startedIdx=i; }
  const lastEnd = segs.length ? segs[segs.length-1]._end : null;
  let liveIdx=-1, nextIdx=-1;
  if(startedIdx===-1){
    nextIdx = segs.findIndex(s=>s._start && now<s._start);   // before the day starts
  } else if(lastEnd && now>=lastEnd){
    liveIdx=-1; nextIdx=-1;                                   // whole day finished
  } else {
    liveIdx = startedIdx;
    nextIdx = (liveIdx+1<segs.length) ? liveIdx+1 : -1;
  }
  const focusIdx = liveIdx!==-1 ? liveIdx : nextIdx;

  let lastSection=null;
  const tl=document.getElementById('timeline');
  tl.innerHTML=segs.map((s,i)=>{
    let out='';
    if(s.section && s.section!==lastSection){ out+=`<div class="section-head">${esc(s.section)}</div>`; lastSection=s.section; }

    const isLive=i===liveIdx, isNext=i===nextIdx, isDone=s._end&&now>=s._end;
    const cls=['seg']; if(s.type==='break')cls.push('break'); if(isLive)cls.push('live'); else if(isDone)cls.push('done');
    let badge=''; if(isLive)badge='<div class="badge live">● Live now</div>'; else if(isNext)badge='<div class="badge next">Up next</div>';

    // normalise people: explicit people[] OR single speaker fields
    let people=Array.isArray(s.people)?s.people:null;
    if(!people && s.speaker) people=[{name:s.speaker,role:s.role,org:s.org,photo:s.photo}];

    const personCard=(p)=>{
      const role=[esc(p.role||''),p.org?`<span class="speaker-org">${esc(p.org)}</span>`:''].filter(Boolean).join(', ');
      const av = p.photo ? avatarHTML(p.photo,p.name,false) : '';
      return `<div class="person${p.photo?'':' nopic'}">${av}<div><div class="pn">${esc(p.name)}${p.moderator?'<span class="tag-mod">Mod</span>':''}</div>${role?`<div class="pr">${role}</div>`:''}</div></div>`;
    };

    const segTitle=esc(s.title || (s.type==='break'?'Break':'Session'));
    let body=`<div class="seg-head"><div class="seg-title">${segTitle}</div>${badge}</div>`;
    if(s.type!=='break' && people && people.length){
      body+=`<div class="people">`+people.map(personCard).join('')+`</div>`;
    }
    if(Array.isArray(s.items) && s.items.length){
      body+=`<ul class="items">`+s.items.map(it=>`<li>${esc(it)}</li>`).join('')+`</ul>`;
    }
    if(s.desc) body+=`<div class="seg-desc">${esc(s.desc)}</div>`;
    if(s.note) body+=`<div class="crew-note"><b>Crew</b> &nbsp;${esc(s.note)}</div>`;

    out+=`<div class="${cls.join(' ')}"${i===focusIdx?' id="focus-seg"':''}>
      <div class="time-col">
        <div class="time-start">${fmtTime(s._start)}</div>
        <div class="time-end">→ ${fmtTime(s._end)}</div>
        ${s._dur?`<div class="dur">${s._dur} min</div>`:''}
      </div>
      <div class="info">${body}</div>
    </div>`;
    return out;
  }).join('') || '<div class="err">No schedule items yet. Add some to <b>data.json</b>.</div>';

  // auto-scroll the live (or next) session into view when it changes
  const focusKey = (focusIdx>=0 && segs[focusIdx]) ? (segs[focusIdx].start+'|'+(segs[focusIdx].title||'')) : null;
  if(followLive && focusKey && focusKey!==lastFocusKey){
    const el=document.getElementById('focus-seg');
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
    lastFocusKey=focusKey;
  }
}

function tickClock(){const n=new Date();document.getElementById('clock').textContent=pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());}

async function load(){
  try{
    const res=await fetch(DATA_URL+'?t='+Date.now(),{cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    EVENT=await res.json();
    render();
    const t=new Date();
    document.getElementById('updated').textContent='Live - last checked '+pad(t.getHours())+':'+pad(t.getMinutes())+':'+pad(t.getSeconds());
  }catch(e){
    document.getElementById('timeline').innerHTML='<div class="err">Could not load <b>data.json</b> ('+e.message+'). If you are opening this file directly, run it through a web server or GitHub Pages.</div>';
  }
}

function updateNote(){
  const note=document.getElementById('offNote'); if(!note) return;
  if(OFFSET>0){ note.textContent='Running '+OFFSET+' min behind - times adjusted'; note.className='offset-note late'; }
  else if(OFFSET<0){ note.textContent=Math.abs(OFFSET)+' min ahead - times adjusted'; note.className='offset-note late'; }
  else { note.textContent='On schedule'; note.className='offset-note ok'; }
}
function setSyncState(txt,ok){ const el=document.getElementById('syncState'); if(el){ el.textContent=txt; el.className='sync'+(ok?' on':''); } }
// publish=true when this device made the change, so we broadcast it to the crew
function applyOffset(publish){
  localStorage.setItem(OFFKEY,String(OFFSET));
  updateNote(); render();
  if(publish){
    fetch(NTFY, {method:'POST', body:String(OFFSET)}).catch(()=>{});   // broadcast to crew
  }
}
function applyRemote(v){
  if(v===OFFSET) return;
  OFFSET=v;
  localStorage.setItem(OFFKEY,String(OFFSET));
  const inp=document.getElementById('offset');
  if(inp && document.activeElement!==inp) inp.value=OFFSET;   // don't fight the operator mid-type
  updateNote(); render();
}
(function initOffset(){
  const inp=document.getElementById('offset'); if(!inp) return;
  inp.value=OFFSET;
  inp.addEventListener('input',()=>{ OFFSET=Math.round(Number(inp.value)||0); applyOffset(true); });
  document.getElementById('offMinus').addEventListener('click',()=>{ OFFSET-=1; inp.value=OFFSET; applyOffset(true); });
  document.getElementById('offPlus').addEventListener('click',()=>{ OFFSET+=1; inp.value=OFFSET; applyOffset(true); });
  document.getElementById('offReset').addEventListener('click',()=>{ OFFSET=0; inp.value=OFFSET; applyOffset(true); });
  updateNote();
  const ft=document.getElementById('followLive');
  if(ft){ ft.checked=followLive; ft.addEventListener('change',()=>{ followLive=ft.checked; localStorage.setItem('followLive', followLive?'1':'0'); if(followLive){ lastFocusKey=null; render(); } }); }
  initSync();
})();

function initSync(){
  setSyncState('connecting…',false);
  // pick up the current shared value (ntfy caches recent messages)
  fetch(NTFY+'/json?poll=1&since=12h').then(r=>r.text()).then(t=>{
    const lines=t.trim().split('\n').filter(Boolean);
    for(let i=lines.length-1;i>=0;i--){
      try{ const m=JSON.parse(lines[i]); if(m.event==='message' && m.message!=null){ applyRemote(Math.round(Number(m.message)||0)); break; } }catch(e){}
    }
  }).catch(()=>{});
  // live updates via Server-Sent Events over HTTPS (port 443)
  try{
    const es=new EventSource(NTFY+'/sse');
    es.onopen=()=>setSyncState('synced with crew',true);
    es.onerror=()=>setSyncState('reconnecting…',false);   // EventSource auto-reconnects
    es.onmessage=(ev)=>{
      try{ const m=JSON.parse(ev.data); if(m.event==='message' && m.message!=null){ applyRemote(Math.round(Number(m.message)||0)); } }catch(e){}
    };
  }catch(e){ setSyncState('offline - local only',false); }
}

let CREW=null;
async function initCrew(){
  try{
    const r=await fetch('./crew.json?t='+Date.now(),{cache:'no-store'});
    if(!r.ok) return;
    const d=await r.json();
    CREW=Array.isArray(d.crew)&&d.crew.length?d.crew:null;
    if(!CREW) return;
    const sel=document.getElementById('crewSelect');
    sel.innerHTML='<option value="">Select your name…</option>'+CREW.map((p,i)=>`<option value="${i}">${esc(p.name)}</option>`).join('');
    sel.addEventListener('change',()=>renderCrew(sel.value));
    // the On-site "Call times" button lives in the re-rendered meta line, so delegate the toggle
    document.getElementById('event-meta').addEventListener('click',e=>{ if(e.target.closest('.crewbtn')){ const p=document.getElementById('crewPanel'); p.hidden=!p.hidden; } });
    render();   // inject the dropdown into the On-site meta item
  }catch(e){}
}
function renderCrew(idx){
  const wrap=document.getElementById('crewCalls');
  if(idx===''||idx==null||!CREW){ wrap.innerHTML=''; return; }
  const p=CREW[+idx]; if(!p){ wrap.innerHTML=''; return; }
  let html = p.phone ? `<div class="crew-phone">${esc(p.phone)}</div>` : '';
  html += (p.calls||[]).map(c=>{
    const role=[esc(c.role||''), c.room?esc(c.room):''].filter(Boolean).join(' · ');
    return `<div class="crewcall"><div class="cc-when">${esc(c.date)} · ${esc(c.start)} - ${esc(c.end)}</div>${role?`<div class="cc-role">${role}</div>`:''}${c.note?`<div class="cc-note">${esc(c.note)}</div>`:''}</div>`;
  }).join('') || '<div class="crew-empty">No calls listed.</div>';
  wrap.innerHTML=html;
}

tickClock(); setInterval(tickClock,1000);
load();
initCrew();
setInterval(load,60000);
setInterval(render,30000);
</script>
</body>
</html>
