<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run of Show — gassProductions</title>
<style>
  :root{
    --black:#000000; --near-black:#030303; --white:#FFFFFF;
    --gold:#FFE293; --charcoal:#212121; --dark-grey:#333333;
    --muted:#A8ABB4; --border:#2a2a2a; --panel:#0c0c0c;
    --live:#FFE293; --done:#5a5d63; --next:#9fd3a0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--black);color:var(--white);font-family:Arial, Helvetica, sans-serif;-webkit-font-smoothing:antialiased}
  body{line-height:1.6;padding-bottom:64px}
  a{color:var(--gold)}

  /* Header */
  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#000 70%,rgba(0,0,0,.85));border-bottom:1px solid var(--border);backdrop-filter:blur(6px)}
  .head-inner{max-width:900px;margin:0 auto;padding:18px 20px 16px}
  .brandrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .wordmark{font-weight:700;font-size:18px;letter-spacing:.5px}
  .wordmark span{color:var(--gold)}
  .clock{font-variant-numeric:tabular-nums;font-weight:600;font-size:15px;color:var(--gold);text-align:right;line-height:1.2}
  .clock small{display:block;color:var(--muted);font-weight:400;font-size:11px;text-transform:uppercase;letter-spacing:1px}
  h1{font-size:clamp(24px,5vw,40px);font-weight:700;line-height:1.15;margin-top:14px}
  .event-meta{color:var(--muted);font-size:14px;margin-top:6px;display:flex;flex-wrap:wrap;gap:6px 18px}
  .event-meta b{color:var(--white);font-weight:500}
  .divider{height:3px;width:54px;background:var(--gold);border-radius:2px;margin-top:14px}

  /* Status bar */
  .updated{max-width:900px;margin:10px auto 0;padding:0 20px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--next);display:inline-block;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* Timeline */
  main{max-width:900px;margin:18px auto 0;padding:0 20px}
  .seg{display:grid;grid-template-columns:84px 1fr;gap:16px;padding:16px;border:1px solid var(--border);border-radius:14px;background:var(--panel);margin-bottom:12px;position:relative;overflow:hidden}
  .seg.live{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 8px 30px rgba(255,226,147,.12)}
  .seg.done{opacity:.5}
  .seg.break{background:#070707;border-style:dashed}
  .time-col{text-align:left}
  .time-start{font-weight:700;font-size:20px;font-variant-numeric:tabular-nums;line-height:1.1}
  .time-end{color:var(--muted);font-size:13px;font-variant-numeric:tabular-nums}
  .dur{margin-top:6px;display:inline-block;font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:2px 8px;text-transform:uppercase;letter-spacing:.5px}

  .body-col{display:flex;gap:14px;align-items:flex-start}
  .avatar{width:64px;height:64px;border-radius:12px;object-fit:cover;flex:0 0 auto;background:var(--dark-grey);border:1px solid var(--border)}
  .avatar.initials{display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;color:var(--gold)}
  .seg.break .avatar{display:none}
  .info{flex:1;min-width:0}
  .seg-title{font-size:18px;font-weight:600;line-height:1.25}
  .speaker-name{font-size:18px;font-weight:700;line-height:1.2}
  .speaker-title{color:var(--muted);font-size:14px;margin-top:1px}
  .speaker-org{color:var(--white);font-weight:500}
  .seg-desc{font-size:14px;color:#cdcdcd;margin-top:6px}
  .crew-note{margin-top:8px;font-size:13px;color:var(--gold);background:rgba(255,226,147,.08);border:1px solid rgba(255,226,147,.25);border-radius:8px;padding:6px 10px;display:inline-block}
  .crew-note b{text-transform:uppercase;font-size:11px;letter-spacing:1px;color:var(--gold)}

  .badge{position:absolute;top:14px;right:14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;border-radius:20px}
  .badge.live{background:var(--gold);color:#000;animation:pulse 1.6s infinite}
  .badge.next{background:transparent;color:var(--next);border:1px solid var(--next)}
  .badge.done{background:transparent;color:var(--done);border:1px solid var(--done)}

  footer{max-width:900px;margin:30px auto 0;padding:18px 20px;border-top:1px solid var(--border);color:var(--muted);font-size:12px;text-align:center}
  footer b{color:var(--white)}
  .err{max-width:900px;margin:30px auto;padding:20px;border:1px solid #5a2a2a;background:#160a0a;border-radius:12px;color:#ffb4b4}
  @media(max-width:520px){
    .seg{grid-template-columns:64px 1fr;gap:10px;padding:14px}
    .time-start{font-size:17px}
    .avatar{width:54px;height:54px}
    .badge{position:static;display:inline-block;margin-top:8px}
  }
</style>
</head>
<body>
  <header>
    <div class="head-inner">
      <div class="brandrow">
        <div class="wordmark">gass<span>Productions</span></div>
        <div class="clock"><span id="clock">--:--</span><small id="clockdate">Local time</small></div>
      </div>
      <h1 id="event-title">Loading…</h1>
      <div class="event-meta" id="event-meta"></div>
      <div class="divider"></div>
    </div>
  </header>

  <div class="updated"><span class="dot"></span><span id="updated">Live — auto-refreshing</span></div>

  <main id="timeline"></main>

  <footer>
    Run of Show by <b>gassProductions</b> · Live Event &amp; Creative Video Production<br>
    This page updates automatically — keep it open, no need to refresh.
  </footer>

<script>
const DATA_URL = './data.json';
let EVENT = null;

function pad(n){return String(n).padStart(2,'0');}

// Parse "YYYY-MM-DD" + "HH:MM" into a Date in the viewer's local time.
function toDate(dateStr, timeStr){
  if(!dateStr || !timeStr) return null;
  const [y,m,d] = dateStr.split('-').map(Number);
  const [hh,mm] = timeStr.split(':').map(Number);
  return new Date(y, m-1, d, hh, mm, 0, 0);
}

function fmtTime(date){
  if(!date) return '';
  return pad(date.getHours()) + ':' + pad(date.getMinutes());
}

function initials(name){
  if(!name) return '?';
  return name.trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}

function render(){
  if(!EVENT) return;
  document.title = (EVENT.event || 'Run of Show') + ' — gassProductions';
  document.getElementById('event-title').textContent = EVENT.event || 'Untitled Event';

  const meta = [];
  if(EVENT.date)    meta.push(`<span>📅 <b>${niceDate(EVENT.date)}</b></span>`);
  if(EVENT.venue)   meta.push(`<span>📍 <b>${EVENT.venue}</b></span>`);
  if(EVENT.client)  meta.push(`<span>Client: <b>${EVENT.client}</b></span>`);
  if(EVENT.contact) meta.push(`<span>On-site: <b>${EVENT.contact}</b></span>`);
  document.getElementById('event-meta').innerHTML = meta.join('');

  const now = new Date();
  const segs = (EVENT.schedule || []).slice().map(s=>{
    const start = toDate(EVENT.date, s.start);
    const dur = Number(s.duration)||0;
    const end = start ? new Date(start.getTime()+dur*60000) : null;
    return {...s, _start:start, _end:end, _dur:dur};
  }).sort((a,b)=> (a._start?.getTime()||0)-(b._start?.getTime()||0));

  // find the live (or next) segment
  let liveIdx = segs.findIndex(s=> s._start && s._end && now>=s._start && now<s._end);
  let nextIdx = -1;
  if(liveIdx!==-1){ if(liveIdx+1<segs.length) nextIdx = liveIdx+1; }
  else { nextIdx = segs.findIndex(s=> s._start && now < s._start); }

  const tl = document.getElementById('timeline');
  tl.innerHTML = segs.map((s,i)=>{
    const isLive = i===liveIdx;
    const isNext = i===nextIdx;
    const isDone = s._end && now >= s._end;
    const cls = ['seg'];
    if(s.type==='break') cls.push('break');
    if(isLive) cls.push('live');
    else if(isDone) cls.push('done');

    let badge = '';
    if(isLive) badge = '<div class="badge live">● Live now</div>';
    else if(isNext) badge = '<div class="badge next">Up next</div>';

    let avatar = '';
    if(s.type!=='break'){
      if(s.photo){
        avatar = `<img class="avatar" src="${s.photo}" alt="${s.speaker||''}" onerror="this.outerHTML='<div class=\\'avatar initials\\'>${initials(s.speaker||s.title)}</div>'">`;
      } else {
        avatar = `<div class="avatar initials">${initials(s.speaker||s.title)}</div>`;
      }
    }

    let body = '';
    if(s.speaker){
      body = `<div class="speaker-name">${s.speaker}</div>
              <div class="speaker-title">${[s.role, s.org?`<span class="speaker-org">${s.org}</span>`:''].filter(Boolean).join(' · ')}</div>
              ${s.title?`<div class="seg-desc"><b>${s.title}</b></div>`:''}`;
    } else {
      body = `<div class="seg-title">${s.title||'Segment'}</div>`;
    }
    if(s.desc) body += `<div class="seg-desc">${s.desc}</div>`;
    if(s.note) body += `<div class="crew-note"><b>Crew</b> &nbsp;${s.note}</div>`;

    return `<div class="${cls.join(' ')}">
      <div class="time-col">
        <div class="time-start">${fmtTime(s._start)}</div>
        <div class="time-end">→ ${fmtTime(s._end)}</div>
        ${s._dur?`<div class="dur">${s._dur} min</div>`:''}
      </div>
      <div class="body-col">
        ${avatar}
        <div class="info">${body}${badge}</div>
      </div>
    </div>`;
  }).join('') || '<div class="err">No schedule items yet. Add some to <b>data.json</b>.</div>';
}

function niceDate(d){
  const dt = toDate(d,'00:00');
  if(!dt) return d;
  return dt.toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

function tickClock(){
  const now = new Date();
  document.getElementById('clock').textContent = pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
}

async function load(){
  try{
    const res = await fetch(DATA_URL + '?t=' + Date.now(), {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    EVENT = await res.json();
    render();
    const t = new Date();
    document.getElementById('updated').textContent =
      'Live — last checked ' + pad(t.getHours())+':'+pad(t.getMinutes())+':'+pad(t.getSeconds());
  }catch(e){
    document.getElementById('timeline').innerHTML =
      '<div class="err">Could not load <b>data.json</b> ('+e.message+'). If you are opening this file directly, run it through a web server or GitHub Pages.</div>';
  }
}

tickClock(); setInterval(tickClock,1000);
load();
setInterval(load, 60000);   // re-fetch data every 60s so crew see edits automatically
setInterval(render, 30000); // re-evaluate live/next highlighting
</script>
</body>
</html>
