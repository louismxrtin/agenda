<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Show Call — gassProductions</title>
<style>
  :root{--gold:#FFE293;--muted:#A8ABB4;--border:#2a2a2a;--panel:#0c0c0c}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#000;color:#fff;font-family:Arial, Helvetica, sans-serif;line-height:1.6;min-height:100vh;padding:40px 20px}
  .wrap{max-width:760px;margin:0 auto}
  .wordmark{font-weight:700;font-size:18px;letter-spacing:.5px}
  .wordmark span{color:var(--gold)}
  h1{font-size:clamp(28px,6vw,44px);font-weight:700;margin-top:28px;line-height:1.15}
  .sub{color:var(--muted);margin-top:8px}
  .divider{height:3px;width:54px;background:var(--gold);border-radius:2px;margin:20px 0 28px}
  a.card{display:flex;justify-content:space-between;align-items:center;gap:16px;text-decoration:none;color:#fff;border:1px solid var(--border);background:var(--panel);border-radius:14px;padding:18px 20px;margin-bottom:12px;transition:.15s}
  a.card:hover{border-color:var(--gold);transform:translateY(-1px)}
  .card .name{font-size:18px;font-weight:600}
  .card .when{color:var(--muted);font-size:14px}
  .card .arrow{color:var(--gold);font-size:22px}
  footer{color:var(--muted);font-size:12px;margin-top:36px;border-top:1px solid var(--border);padding-top:18px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="wordmark">gass<span>Productions</span></div>
    <h1>Show Call</h1>
    <div class="sub">Live run-of-show pages for crew. Pick an event.</div>
    <div class="divider"></div>

    <!-- ADD ONE LINE PER EVENT. Point href to the event folder. -->
    <a class="card" href="adobe-creative-summit/">
      <div><div class="name">Adobe Creative Summit 2026</div><div class="when">24 September 2026 · The Brewery, London</div></div>
      <div class="arrow">→</div>
    </a>

    <footer>gassProductions · Live Event &amp; Creative Video Production · info@gassproductions.co.uk</footer>
  </div>
</body>
</html>
